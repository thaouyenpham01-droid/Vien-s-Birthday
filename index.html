<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Birthday</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 120px;
      background: #fff5f8;
    }

    a {
      font-size: 28px;
      color: #ff2f75;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
    }

    #message {
      display: none;
      margin-top: 40px;
      font-size: 46px;
      font-weight: bold;
      color: #ff1493;
    }
  </style>
</head>
<body>

  <a onclick="showMessage()">Nhấp vào đây 🎁</a>

  <div id="message">Happy Birthday Tố Viên 🎂💖</div>

  <script>
    function showMessage() {
      document.getElementById("message").style.display = "block";
    }
  </script>

</body>
</html>
